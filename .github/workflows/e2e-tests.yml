name: E2E Tests

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  # Manual trigger from the Actions tab with a branch picker.
  workflow_dispatch:

concurrency:
  group: e2e-tests-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  e2e:
    name: Playwright e2e (Chromium + extension)
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers + OS deps
        run: npx playwright install --with-deps chromium

      - name: Build extension
        run: npm run build

      # The extension fixture launches Chromium with `headless: false`
      # (required for MV3 extension loading). xvfb-run provides a
      # virtual X display so the browser can start without a physical
      # screen on GitHub-hosted runners.
      #
      # --max-failures=5 aborts after 5 test failures — a known-broken
      # baseline doesn't burn the full 20-min timeout budget.
      # --retries=0 skips the 60 s retry penalty on every failing test.
      - name: Run Playwright tests
        run: xvfb-run --auto-servernum -- npx playwright test --config e2e/playwright.config.ts --max-failures=5 --retries=0

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
          if-no-files-found: ignore

      - name: Upload test results (traces + screenshots)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-test-results
          path: test-results/
          retention-days: 7
          if-no-files-found: ignore
